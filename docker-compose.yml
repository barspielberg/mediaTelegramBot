version: '3.4'

services:
  media-telegram-bot:
    image: media-telegram-bot
    env_file:
      - .env
    build:
      context: .
      dockerfile: ./Dockerfile
    network_mode: host
    develop:
      watch:
        - action: sync+restart
          path: ./src
          target: /app
          ignore:
            - node_modules
